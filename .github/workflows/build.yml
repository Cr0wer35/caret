name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + lint
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install tools
        run: |
          brew install swiftlint swift-format

      - name: swift-format (check only)
        working-directory: Caret/Caret
        run: |
          swift-format lint --recursive --strict .

      - name: SwiftLint
        run: |
          swiftlint lint --strict --reporter github-actions-logging

      - name: Build (Debug)
        working-directory: Caret
        run: |
          set -o pipefail
          xcodebuild \
            -project Caret.xcodeproj \
            -scheme Caret \
            -configuration Debug \
            -destination 'platform=macOS' \
            clean build \
            CODE_SIGNING_ALLOWED=NO | xcbeautify || xcodebuild \
            -project Caret.xcodeproj \
            -scheme Caret \
            -configuration Debug \
            -destination 'platform=macOS' \
            clean build \
            CODE_SIGNING_ALLOWED=NO
